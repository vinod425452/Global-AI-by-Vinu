<!DOCTYPE html>
<html>
<head>
  <title>AI Chatbot - Vinu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      padding: 15px;
      background: #1e293b;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
    }

    #chat {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .msg {
      margin: 8px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 70%;
    }

    .user {
      background: #3b82f6;
      align-self: flex-end;
    }

    .bot {
      background: #334155;
      align-self: flex-start;
    }

    .input-box {
      display: flex;
      padding: 10px;
      background: #1e293b;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 5px;
    }

    button {
      margin-left: 10px;
      padding: 10px 15px;
      border: none;
      background: #3b82f6;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>🤖 Vinu AI Chatbot</header>

<div id="chat"></div>

<div class="input-box">
  <input id="input" placeholder="Type your message..." />
  <button onclick="send()">Send</button>
</div>

<script>
function send() {
  let input = document.getElementById("input");
  let chat = document.getElementById("chat");

  if (input.value.trim() === "") return;

  let userMsg = document.createElement("div");
  userMsg.className = "msg user";
  userMsg.innerText = input.value;
  chat.appendChild(userMsg);

  let botMsg = document.createElement("div");
  botMsg.className = "msg bot";
  botMsg.innerText = "Thinking... 🤔";
  chat.appendChild(botMsg);

  setTimeout(() => {
    botMsg.innerText = "You said: " + input.value;
  }, 500);

  input.value = "";
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
  </html>
